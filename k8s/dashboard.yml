---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark-dashboard
  namespace: spark

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-dashboard-role
  namespace: spark
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/logs"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-dashboard-binding
  namespace: spark
subjects:
  - kind: ServiceAccount
    name: spark-dashboard
    namespace: spark
roleRef:
  kind: Role
  name: spark-dashboard-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-dashboard
  namespace: spark
  labels:
    app: spark-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-dashboard
  template:
    metadata:
      labels:
        app: spark-dashboard
      spec:
        serviceAccountName: spark-dashboard
        containers:
          - name: dashboard
            image: spark-dashboard:latest
            imagePullPolicy: Never
            ports:
              - containerPort: 5000
                name: http
            env:
              - name: SPARK_NAMESPACE
                value: "spark"
              - name: JOBS_DIR
                value: "/apps/jobs"
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "256Mi"
                cpu: "200m"
            readinessProbe:
              httpGet:
                path: /
                port: 5000
              initialDelaySeconds: 10
              periodSeconds: 5
            livenessProbe:
              httpGet:
                path: /
                port: 5000
              initialDelaySeconds: 30
              periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: spark-dashboard
  namespace: spark
  labels:
    app: spark-dashboard
spec:
  type: NodePort
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30050
      protocol: TCP
      name: http
  selector:
    app: spark-dashboard