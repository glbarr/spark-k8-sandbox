---
# Persistent Volume Claim for Spark History Server
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: spark-history-pvc
  namespace: spark
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# Spark History Server Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-history-server
  namespace: spark
  labels:
    app: spark-history-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-history-server
  template:
    metadata:
      labels:
        app: spark-history-server
    spec:
      containers:
      - name: spark-history-server
        image: apache/spark:3.5.3-python3
        command:
          - /opt/spark/sbin/start-history-server.sh
        env:
          - name: SPARK_HISTORY_OPTS
            value: >-
              -Dspark.history.fs.logDirectory=/tmp/spark-events
              -Dspark.history.ui.port=18080
          - name: SPARK_NO_DAEMONIZE
            value: "true"
        ports:
          - containerPort: 18080
            name: http
        volumeMounts:
            - name: spark-events
              mountPath: /tmp/spark-events
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /
            port: 18080
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 18080
          initialDelaySeconds: 30
          periodSeconds: 20
      volumes:
        - name: spark-events
          persistentVolumeClaim:
            claimName: spark-history-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: spark-history-server
  namespace: spark
  labels:
    app: spark-history-server
spec:
  type: NodePort
  ports:
    - port: 18080
      targetPort: 18080
      nodePort: 32080
      name: http
  selector:
    app: spark-history-server